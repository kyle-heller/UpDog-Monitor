global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'discord'

  routes:
    - match:
        severity: critical
      receiver: 'discord'
      repeat_interval: 1h

receivers:
  - name: 'discord'
    webhook_configs:
      # Replace with Discord webhook adapter (e.g. benjojo/alertmanager-discord)
      - url: 'http://localhost:9095'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
